code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "**/*.{ts,tsx}"
        instructions: |
          Use JSDoc format for exported functions and components. Include:
          - Brief description of purpose
          - @param for parameters with types and descriptions
          - @returns for return types and descriptions
          - @throws for potential errors
          - @example for complex functions

          All exported functions must have explicit return types (Promise<T> for async, JSX.Element for components).
          Keep docstrings concise and focused on "why" not "what".

          Example:
          /**
           * Validates user input against Zod schema and returns typed result.
           * @param schema - Zod schema to validate against
           * @param data - Input data to validate
           * @returns Validation result with success flag and data or errors
           * @throws {Error} If validation fails and strict mode is enabled
           */
          export function validateInput<T>(schema: z.ZodSchema<T>, data: unknown): Result<T>
      - path: "app/**/*.tsx"
        instructions: |
          For Next.js App Router components:
          - Document Server Components (default) vs Client Components ("use client")
          - Note data fetching patterns (Supabase queries)
          - Document props with TypeScript interfaces
          - Include accessibility considerations when relevant

          Example:
          /**
           * Server Component that fetches and displays article list.
           * Uses Supabase client from @/lib/supabase/server.
           * @param searchParams - URL search parameters for filtering
           * @returns Server-rendered article list page
           */
          export default async function ArticlesPage({ searchParams }: { searchParams: SearchParams }): Promise<JSX.Element>
      - path: "components/**/*.tsx"
        instructions: |
          For React components:
          - Document component purpose and usage
          - Document props interface
          - Note if using Shadcn/ui, Radix UI, or Recharts
          - Include accessibility features (ARIA, keyboard nav)
          - Document any Supabase data dependencies

          Example:
          /**
           * Displays article card with title, tags, and metadata.
           * Uses Shadcn Card and Badge components.
           * @param article - Article data from Supabase
           * @param onTagClick - Callback when tag is clicked
           * @returns Accessible article card component
           */
          export function ArticleCard({ article, onTagClick }: ArticleCardProps): JSX.Element
      - path: "lib/**/*.ts"
        instructions: |
          For utility functions and helpers:
          - Document validation functions (Zod schemas)
          - Document Supabase query helpers
          - Document error handling utilities
          - Include usage examples for complex functions

          Example:
          /**
           * Creates Supabase client for server-side usage.
           * Handles Next.js 16 cookie management with getAll()/setAll().
           * @returns Configured Supabase client instance
           */
          export async function createClient(): Promise<SupabaseClient>
      - path: "supabase/**/*.sql"
        instructions: |
          For SQL migrations and functions:
          - Document RLS policies and their purpose
          - Document database functions with parameters
          - Note security considerations (SECURITY INVOKER, search_path)
          - Include migration dependencies if any

          Example:
          -- Creates comments table with RLS enabled.
          -- Requires articles table to exist.
          -- Policies: public read, authenticated insert/update/delete.
  unit_tests:
    path_instructions:
      - path: "**/*.{ts,tsx}"
        instructions: |
          Generate tests using Vitest with Testing Library for React components.
          Follow project patterns:

          - Test files: `tests/**/*.test.ts` or `tests/**/*.test.tsx`
          - Use property-based testing with fast-check for validation logic
          - Test user interactions, not implementation details
          - Mock Supabase clients appropriately
          - Use jsdom for React component testing

          Test structure:
          ```typescript
          import { describe, it, expect } from 'vitest'
          import { render, screen } from '@testing-library/react'
          import userEvent from '@testing-library/user-event'

          describe('ComponentName', () => {
            it('renders correctly', () => {
              // Test implementation
            })

            it('handles user interaction', async () => {
              const user = userEvent.setup()
              // Test user interactions
            })
          })
          ```

          For validation functions, use property-based testing:
          ```typescript
          import { fc } from 'fast-check'

          describe('validation', () => {
            it('validates email format', () => {
              fc.assert(fc.property(fc.emailAddress(), (email) => {
                const result = validateEmail(email)
                expect(result.success).toBe(true)
              }))
            })
          })
          ```

          Always test:
          - Happy paths
          - Error cases
          - Edge cases
          - Accessibility (ARIA, keyboard nav) for components
      - path: "components/**/*.tsx"
        instructions: |
          For React component tests:
          - Test rendering with different props
          - Test user interactions (clicks, form submissions)
          - Test accessibility (screen reader, keyboard navigation)
          - Test loading and error states
          - Mock Supabase data fetching
          - Test Shadcn/ui component integration

          Example:
          ```typescript
          describe('ArticleCard', () => {
            it('renders article title and tags', () => {
              const article = { id: '1', title: 'Test', tags: ['security'] }
              render(<ArticleCard article={article} />)
              expect(screen.getByText('Test')).toBeInTheDocument()
              expect(screen.getByText('security')).toBeInTheDocument()
            })

            it('calls onTagClick when tag is clicked', async () => {
              const user = userEvent.setup()
              const onTagClick = vi.fn()
              render(<ArticleCard article={article} onTagClick={onTagClick} />)
              await user.click(screen.getByText('security'))
              expect(onTagClick).toHaveBeenCalledWith('security')
            })
          })
          ```
      - path: "lib/**/*.ts"
        instructions: |
          For utility function tests:
          - Test validation functions with valid and invalid inputs
          - Test Supabase query helpers with mocked clients
          - Test error handling and edge cases
          - Use property-based testing for validation logic

          Example:
          ```typescript
          describe('validateInput', () => {
            it('validates correct input', () => {
              const result = validateInput(loginSchema, { email: 'test@example.com', password: 'password123' })
              expect(result.success).toBe(true)
            })

            it('rejects invalid input', () => {
              const result = validateInput(loginSchema, { email: 'invalid' })
              expect(result.success).toBe(false)
            })
          })
          ```
      - path: "app/**/*.tsx"
        instructions: |
          For Next.js App Router page tests:
          - Test server component data fetching (mock Supabase)
          - Test search params handling
          - Test error boundaries
          - Test loading states

          Note: Server Components require special mocking of async functions.
          Use Vitest's async testing capabilities.
