name: Copilot Setup
"on":
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: jdx/mise-action@v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate setup
        run: just ci-check

      - name: Display environment info
        run: just info
